name: Despertar Real Lecturas HES

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Navegar a la App (Modo Invisible)
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            console.log('Abriendo la aplicación...');
            await page.goto('https://lecturas-hes.streamlit.app/', { waitUntil: 'networkidle' });
            console.log('Página cargada y WebSockets activos.');
            await new Promise(r => setTimeout(r, 5000)); // Esperamos 5 seg para asegurar el ping
            await browser.close();
            console.log('Proceso terminado con éxito.');
          })();
          "
          
      - name: Confirmación de Actividad
        if: success()
        run: echo "✅ La aplicación Lecturas HES ha sido despertada en modo headless."
