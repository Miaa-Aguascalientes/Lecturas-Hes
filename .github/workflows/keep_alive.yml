name: Despertar Real Lecturas HES

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -g playwright
          # Instalamos específicamente chromium que es el más compatible
          npx playwright install chromium --with-deps

      - name: Navegar a la App (Simulación Real)
        run: |
          # Usamos 'cr' (Chromium) en lugar de 'wk' y añadimos un timeout
          npx playwright cr https://lecturas-hes.streamlit.app/
          
      - name: Confirmación de Actividad
        if: success()
        run: echo "✅ La aplicación Lecturas HES ha sido despertada correctamente."
