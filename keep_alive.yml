name: Despierta Streamlit

on:
  schedule:
    # Se ejecuta cada 4 horas (6 veces al día)
    - cron: '0 */4 * * *'
  workflow_dispatch: # ESTA LÍNEA ES LA QUE ACTIVA EL BOTÓN MANUAL

jobs:
  ping_job:
    name: Trabajo de Despertado
    runs-on: ubuntu-latest
    steps:
      - name: Enviando señal a la App
        run: |
          curl -I https://lecturas-hes.streamlit.app/
          echo "Ping enviado con éxito a las $(date)"
