name: Despierta Streamlit

on:
  schedule:
    # Se ejecuta cada 4 horas (6 veces al día)
    # 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping App Movil
        run: |
          curl -I https://lecturas-hes.streamlit.app/
          echo "Ping enviado a las $(date)"